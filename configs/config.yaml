backend:
  logging:
    path: byeias.log
    level: INFO
    max_bytes: 5000000
    backup_count: 3
    format: "%(asctime)s [%(levelname)s] %(name)s - %(message)s"
    date_format: "%Y-%m-%d %H:%M:%S"

  classification:
    model_name: roberta-base
    tokenizer_max_length: 256
    dropout_rate: 0.3
    sexism_num_labels: 2
    racism_num_labels: 2
    loss_ignore_index: -1
    default_device: auto

    dataloader:
      default_batch_size: 8
      train_shuffle: true
      eval_shuffle: false

    training:
      default_epochs: 3
      default_learning_rate: 0.00001
      best_model_path: data/models/full_model.pt

    dataset:
      fillna_context: ""
      required_columns:
        - input_ids
        - attention_mask
        - sexism_label
        - racism_label
  llm:
    model_name: mistral-large-latest
    max_tokens: 1000
    temperature: 0.7
    api_key: z2rOqdKlz3KXc6zy0IvhEMeQbHSLdsAE
    system_prompt: data/system_prompt.txt

